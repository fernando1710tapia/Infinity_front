<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Forma Pago</ui:define>

    <ui:define name="viewname">
        <li>Forma Pago</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{formaPagoBean.nuevaFormaP()}" update="formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem"/>
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="formaP" value="#{formaPagoBean.listaFormaP}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Forma Pago</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:ajax event="rowToggle" listener="#{crudDemoView.onRowToggle}" />

                                <p:column headerText="Código" sortBy="#{formaP.codigo}" filterBy="#{formaP.codigo}" width="10%">
                                    <h:outputText value="#{formaP.codigo}" />
                                </p:column>
                                <p:column headerText="Nombre" sortBy="#{formaP.nombre}" filterBy="#{formaP.nombre}" width="25%">
                                    <h:outputText value="#{formaP.nombre}" />
                                </p:column>
                                <p:column headerText="Estado" sortBy="#{formaP.activo}" filterBy="#{formaP.activo}" width="15%">
                                    <h:outputText styleClass="product-badge status-#{estilos.tipoActivoBool(formaP.activo)}" value="#{estilos.valorBoolActivo(formaP.activo)}" />
                                </p:column>
                                <p:column headerText="Código SRI" sortBy="#{formaP.codigosri}" filterBy="#{formaP.codigosri}" width="10%">
                                    <h:outputText value="#{formaP.codigosri}" />
                                </p:column>
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{formaPagoBean.editaFormaP(formaP)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{formaP}" target="#{formaPagoBean.formaP}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{formaP}" target="#{formaPagoBean.formaP}" />
                                    </p:commandButton>
                                </p:column>
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>
        <p:dialog header="Forma Pago" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered = "true">
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="codigo" value="#{formaPagoBean.formaP.codigo}" required="true" maxlength="2" disabled="#{formaPagoBean.soloLectura}">
                                    <p:keyFilter mask="num" />
                                </p:inputText> 
                                <p:outputLabel for="codigo">Código</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-12">
                            <span class="ui-float-label">                                            
                                <p:inputText id="nombre" value="#{formaPagoBean.formaP.nombre}" required="true" maxlength="50"/>
                                <p:outputLabel for="nombre">Nombre</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-m-d6">
                            <p:outputLabel for="codSri" value="Código SRI (código 20 sugerido)"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="codSri" value="#{formaPagoBean.formaP.codigosri}" title="Código SRI"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" 
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Código SRI">
                                    <f:selectItem noSelectionOption="true" itemLabel="Selecciona" itemValue="#{null}"/>
                                    <f:selectItem itemLabel="01 - Sin utilización del sistema financiero" itemValue="01"/>
                                    <f:selectItem itemLabel="03 - Cheque certificado" itemValue="03"/>
                                    <f:selectItem itemLabel="19 - Tarjeta de crédito" itemValue="19"/>
                                    <f:selectItem itemLabel="20 - Con utilización del sistema financiero" itemValue="20"/>                                    
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{formaPagoBean.estadoFormaP}" > </p:toggleSwitch>
                            </div>
                        </div>             
                    </div>
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{formaPagoBean.save()}"
                                     update=":form formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Forma Pago?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{formaPagoBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
