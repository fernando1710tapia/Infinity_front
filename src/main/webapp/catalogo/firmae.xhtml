<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Firma E</ui:define>

    <ui:define name="viewname">
        <li>Firma E</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{firmaEBean.nuevoFirma()}" update="formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem"/>
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="firmae" value="#{firmaEBean.listaFirmaE}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista FirmaE</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:ajax event="rowToggle" listener="#{crudDemoView.onRowToggle}" />

                                <p:column headerText="Código" sortBy="#{firmae.fir_codigo}" filterBy="#{firmae.fir_codigo}" width="10%">
                                    <h:outputText value="#{firmae.fir_codigo}" />
                                </p:column>
                                <p:column headerText="Tipo" sortBy="#{firmae.fir_tipo}" filterBy="#{firmae.fir_tipo}" width="10%">
                                    <h:outputText value="#{firmae.fir_tipo}" />
                                </p:column>
                                <p:column headerText="Descripción" sortBy="#{firmae.fir_descripcion}" filterBy="#{firmae.fir_descripcion}" width="30%">
                                    <h:outputText value="#{firmae.fir_descripcion}" />
                                </p:column>
                                <p:column headerText="Estado" sortBy="#{firmae.fir_estado}" filterBy="#{firmae.fir_estado}" width="8%">
                                    <h:outputText value="#{firmae.fir_estado}" />
                                </p:column>
                                <p:column headerText="Correo Alertas" sortBy="#{firmae.fir_correoalertas}" filterBy="#{firmae.fir_correoalertas}" width="25%">
                                    <h:outputText value="#{firmae.fir_correoalertas}" />
                                </p:column>
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{firmaEBean.editarFirma(firmae)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{firmae}" target="#{firmaEBean.firmaE}" />
                                    </p:commandButton>
                                    <!--<p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="{banco}" target="{firmaEBean.objeto}" />
                                    </p:commandButton>-->
                                </p:column>
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>
        <p:dialog header="Firmae" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered = "true">
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="codigo" value="#{firmaEBean.firmaE.fir_codigo}" required="true" maxlength="2" disabled="#{firmaEBean.soloLectura}">
                                    <p:keyFilter mask="num" />
                                </p:inputText> 
                                <p:outputLabel for="codigo">Código</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-12">
                            <span class="ui-float-label">                                            
                                <p:inputText id="nombre" value="#{firmaEBean.firmaE.fir_descripcion}" required="true" maxlength="50"/>
                                <p:outputLabel for="nombre">Nombre</p:outputLabel>
                            </span>
                        </div>                       
                    </div>
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{firmaEBean.save()}"
                                     update=":form formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <!--<p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Banco?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="{firmaEBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>-->

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
