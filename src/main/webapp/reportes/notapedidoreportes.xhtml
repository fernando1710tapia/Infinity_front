<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Reportes Nota Pedido</ui:define>

    <ui:define name="viewname">
        <li>Reportes</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="#{facturacionBean.mostarPantallaInicial}">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Generar Factura" icon="pi pi-plus" actionListener="#{facturacionBean.nuevaFactura}" update="form" 
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Exposrt" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                            <div class="ui-fluid p-formgrid p-grid">   
                                <div class="p-field p-col-12 p-md-4">
                                    <p:outputLabel for="comercializadora" value="Comercializadora"/>
                                    <div class="ui-inputgroup">
                                        
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-shopping-cart"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{facturacionBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg">
                                            <f:selectItem noSelectionOption="true" itemLabel="Seleccionar" itemValue="#{null}"/>
                                            <f:selectItems value="#{facturacionBean.listaComercializadora}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />
                                            <p:ajax event="change" listener="#{facturacionBean.seleccionarComercializdora}"/>
                                        </p:selectOneMenu> 
                                    </div>
                                </div>
                                <div class="p-field p-col-12 p-md-4">  
                                    <p:outputLabel for="fechaI" value="Fecha Inicio"/>
                                    <p:datePicker id="fechaI" value="#{facturacionBean.fecha}" showIcon="true" pattern="dd/MM/yyyy"/>                                  
                                </div>
                                <div class="p-field p-col-12 p-md-4">                                  
                                    <p:outputLabel for="fechaV" value="Fecha Venta"/>
                                    <p:datePicker id="fechaV" value="#{facturacionBean.fecha}" showIcon="true" pattern="dd/MM/yyyy"/>                                  
                                </div>

                                <div class="p-field p-col-12 p-md-4">
                                </div>

<!--                                <div class="p-field p-col-12 p-md-2">
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="{facturacionBean.obtenerFacturas()}" update="form"/>
                                </div>-->

                            </div>                              
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>    

        <p:confirmDialog widgetVar="reenvioPetro" showEffect="fade" width="300" message="Reenviar a Petro?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{crudDemoView.deleteProduct}" process="@this" oncomplete="PF('reenvioPetro').hide()"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('reenvioPetro').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog> 
    </ui:define>
</ui:composition>
