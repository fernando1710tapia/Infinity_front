<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Fecha Festiva</ui:define>

    <ui:define name="viewname">
        <li>Fecha Festiva</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{fechaFestivaBean.nuevaFecha()}" update="formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem"/>
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>
                            <div class="ui-fluid p-formgrid p-grid">  
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{fechaFestivaBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         filter="true" filterMatchMode="startsWith"
                                                         disabled="#{!fechaFestivaBean.habilitarComer}">
                                            <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}" />   
                                            <f:selectItems value="#{fechaFestivaBean.listaComercializadora}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />  
                                            <p:ajax event="change" listener="#{fechaFestivaBean.seleccionarComercializadora}"/>
                                        </p:selectOneMenu>
                                    </div>                            
                                </div>
                                <div class="p-field p-col-12 p-md-4">
                                    <span class="ui-float-label">
                                        <p:inputText id="anio" value="#{fechaFestivaBean.year}" maxlength="4" >
                                            <p:keyFilter regEx="/[\d]/"/> 
                                        </p:inputText>
                                        <p:outputLabel for="anio" value="Año"/>
                                    </span>
                                </div>
                                <div class="p-field p-col-12 p-md-2">                
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="#{fechaFestivaBean.obtenerFechafestiva()}" update="dt-products"/>
                                </div>
                            </div>

                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="fecha" value="#{fechaFestivaBean.listaFechafestiva}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Fechas Festivas</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>                               

                                <p:column headerText="Comercializadora" sortBy="#{fecha.fechafestivaPK.codigocomercializadora}" filterBy="#{fecha.fechafestivaPK.codigocomercializadora}" width="15%">
                                    <h:outputText value="#{fecha.fechafestivaPK.codigocomercializadora}" />
                                </p:column>
                                <p:column headerText="Fecha" sortBy="#{fecha.fechafestivaPK.festivo}" filterBy="#{fecha.fechafestivaPK.festivo}" width="15%">
                                    <h:outputText value="#{fecha.fechafestivaPK.festivo}" >
                                        <f:convertDateTime pattern="dd/MM/yyyy" type="date" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Estado" sortBy="#{fecha.activo}" filterBy="#{fecha.activo}" width="15%">
                                    <h:outputText styleClass="product-badge status-#{estilos.tipoActivoBool(fecha.activo)}" value="#{estilos.valorBoolActivo(fecha.activo)}" />
                                </p:column>
                                <p:column headerText="Descripción" sortBy="#{fecha.descripcion}" filterBy="#{fecha.descripcion}">
                                    <h:outputText value="#{fecha.descripcion}" />
                                </p:column>
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{fechaFestivaBean.editarFecha(fecha)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{fecha}" target="#{fechaFestivaBean.fechafestiva}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{fecha}" target="#{fechaFestivaBean.fechafestiva}" />
                                    </p:commandButton>
                                </p:column>
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>
        <p:dialog header="Fecha Festiva" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered = "true">
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="comercilaizadora1" value="Comercializadora"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="comercilaizadora1" value="#{fechaFestivaBean.comercializadora}" title="Comercializadora"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 converter="converterg"
                                                 autoWidth="false" disabled="#{!fechaFestivaBean.bandera}"
                                                 filter="true" filterMatchMode="startsWith"
                                                 >
                                    <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/> 
                                    <f:selectItems value="#{fechaFestivaBean.listaComercializadora}"
                                                   var="comer"
                                                   itemLabel="#{comer.objRelacionado}"
                                                   itemValue="#{comer}" />  
                                    <p:ajax event="change" listener="#{fechaFestivaBean.seleccionarComercializadora()}" ></p:ajax>                
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="fechaFes" value="Fecha Festiva"/>
                            <span class="ui-float-label">
                                <p:datePicker id="fechaFes" value="#{fechaFestivaBean.fechafestivaPK.festivo}" showIcon="true" pattern="dd/MM/yyyy" disabled="#{fechaFestivaBean.editarFechafestiva}"/>                                                                                                              
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div>  
                        <div class="p-field p-col-12 p-md-12">  
                            <span class="ui-float-label">
                                <p:inputTextarea id="descripcion" value="#{fechaFestivaBean.fechafestiva.descripcion}" />
                                <p:outputLabel for="descripcion" value="Descripción"/>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{fechaFestivaBean.estadoFechafestiva}" > </p:toggleSwitch>
                            </div>
                        </div>                             
                        <div class="p-field p-col-12 p-md-12"></div>                            
                    </div>
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{fechaFestivaBean.save()}"
                                     update=":form:dt-products formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Fecha Festiva?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{fechaFestivaBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
