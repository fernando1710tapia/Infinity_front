<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Uso de Sellos</ui:define>

    <ui:define name="viewname">
        <li>Uso de Sellos</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="#{usosellosBean.mostrarPantallaInicial}">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Asignar" icon="pi pi-plus" actionListener="#{usosellosBean.asignacion()}" update="form :formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                            </p:toolbar>
                            <div class="ui-fluid p-formgrid p-grid">
                                <div class="p-field p-col-12 p-md-3">
                                    <label for="comercializadora" class="floating-label">Comercializadora</label>
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-shopping-cart"></i>
                                        </span>                                        
                                        <p:selectOneMenu id="comercializadora" value="#{usosellosBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         disabled="#{!usosellosBean.habilitarComer}">
                                            <f:selectItem noSelectionOption="true" itemLabel="Seleccione..." itemValue="#{null}"/>
                                            <f:selectItems value="#{usosellosBean.listaComercializadora}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />
                                            <p:ajax event="change" listener="#{usosellosBean.seleccionarComerc(1)}" update="form"/>
                                        </p:selectOneMenu> 
                                    </div>                          
                                </div>
                                <div class="p-field p-col-12 p-md-3">
                                    <label for="term" class="floating-label">Terminal</label>
                                    <div class="ui-inputgroup">                                       
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-shopping-cart"></i>
                                        </span>                                     
                                        <p:selectOneMenu id="term" value="#{usosellosBean.terminal}" title="Terminal"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg">
<!--                                                         disabled="#{!usosellosBean.habilitarTerminal}">-->
                                            <f:selectItem noSelectionOption="true" itemLabel="Seleccione..." itemValue="#{null}"/>
                                            <f:selectItems value="#{usosellosBean.listaTermianles}"
                                                           var="ter"
                                                           itemLabel="#{ter.codigo} - #{ter.nombre}"                                                           
                                                           itemValue="#{ter}" />
                                            <p:ajax event="change" listener="#{usosellosBean.seleccionarTerminal(1)}" />
                                        </p:selectOneMenu> 
                                    </div> 
                                </div>
                                <div class="p-field p-col-12 p-md-2">                                  
                                    <p:outputLabel for="fechaIn" value="Fecha Inicio"/>
                                    <p:datePicker id="fechaIn" value="#{usosellosBean.fechaInicial}" showIcon="true" pattern="dd/MM/yyyy" >
                                        <p:ajax event="dateSelect" update="fechaFin"/>
                                    </p:datePicker>
                                </div>
                                <div class="p-field p-col-12 p-md-2">                                  
                                    <p:outputLabel for="fechaFin" value="Fecha Final"/>
                                    <p:datePicker id="fechaFin" value="#{usosellosBean.fechaFinal}" showIcon="true" pattern="dd/MM/yyyy" mindate="#{sellosBean.fechaInicial}"/>                                   
                                </div>
                                <div class="p-field p-col-12 p-md-2">
                                    <p:outputLabel for="btnBuscar" value="."/>
                                    <p:commandButton id="btnBuscar" value="Buscar" icon="pi pi-search"  actionListener="#{usosellosBean.consultarUsoSellos()}" update="form:dt-products"/>
                                </div>
                            </div>                              
                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="unenviousoSello" value="#{usosellosBean.listaEnvioUsoSellos}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Sellos utilizados en pedidos</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:ajax event="rowToggle" listener="#{crudDemoView.onRowToggle}" />

                                <p:column headerText="Fecha" filterBy="#{unenviousoSello.fecha}" width="10%">
                                    <h:outputText value="#{unenviousoSello.fecha}" />
                                </p:column>
                                <p:column headerText="Nota Pedido" filterBy="#{unenviousoSello.npconcatenada}" width="15%">
                                    <h:outputText value="#{unenviousoSello.npconcatenada}" />
                                </p:column>
                                <p:column headerText="Sello Usado" filterBy="#{unenviousoSello.selloconcatenado}" width="15%">
                                    <h:outputText value="#{unenviousoSello.selloconcatenado}" />
                                </p:column>
                                <p:column headerText="Autotanque" filterBy="#{unenviousoSello.placa}" width="10%">
                                    <h:outputText value="#{unenviousoSello.placa}" />
                                </p:column>
                                <p:column headerText="Conductor"  filterBy="#{unenviousoSello.nombreconductor}" width="10%">
                                    <h:outputText value="#{unenviousoSello.nombreconductor}" />
                                </p:column>
                                <p:column headerText="Nombre Cliente" filterBy="#{unenviousoSello.nombrecliente}" width="15%">
                                    <h:outputText value="#{unenviousoSello.nombrecliente}" />
                                </p:column>
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{usosellosBean.editarUsoSello(unenviousoSello,true)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this"> 
                                    </p:commandButton>
                                </p:column>
                                <p:column style="width: 3.5rem">
                                    <p:commandButton icon="pi pi-print" actionListener="#{usosellosBean.generarReporteAux(unenviousoSello)}" ajax="false"
                                                     onstart="PF('blockUIWidget').block()" 
                                                     oncomplete="PF('blockUIWidget').unblock()"
                                                     onclick="PrimeFaces.monitorDownload(start, stop);"
                                                     update="@form" styleClass="edit-button rounded-button ui-button-success">
                                        <p:fileDownload value="#{usosellosBean.pdfStream}"/>
                                    </p:commandButton>
                                </p:column>
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Anular Nota Pedido?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{notapedidoBean.anularNotaPedido()}" process="@this" oncomplete="PF('deleteProductDialog').hide()" update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog widgetVar="errorDialog" showEffect="fade" width="300" message="#{usosellosBean.usosellosBeanMensajeError}" header="Confirm" severity="FATAL">

                </p:commandButton>
