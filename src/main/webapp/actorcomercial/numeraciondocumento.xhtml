<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Numeración Documentos</ui:define>

    <ui:define name="viewname">
        <li>Numeración Documentos</li>
        <li>/</li>
        <li>
            <p:link outcome="/crud">Crud</p:link>
        </li>
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{numeracionDocumentoBean.nuevoNumeracion()}" update="form :formNuevo" 
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>
                            <div class="ui-fluid p-formgrid p-grid">                                
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{numeracionDocumentoBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         filter="true" filterMatchMode="startsWith"
                                                         disabled="#{!numeracionDocumentoBean.habilitarComer}">                                            
                                            <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                            <f:selectItems value="#{numeracionDocumentoBean.listaComercializadoras}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />      
                                            <p:ajax event="change" listener="#{numeracionDocumentoBean.seleccionarComer()}"/>
                                        </p:selectOneMenu>
                                    </div>                            
                                </div>                                                                
                                <div class="p-field p-col-12 p-md-2">                
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="#{numeracionDocumentoBean.actualizarLista()}" immediate="true" update="dt-products"/>
                                </div>
                            </div>
                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="numer" value="#{numeracionDocumentoBean.listaNumeracion}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Numeración Documentos</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>
                                
                                <p:column headerText="Código" sortBy="#{numer.id}" filterBy="#{numer.id}" width="10%">
                                    <h:outputText value="#{numer.id}" />
                                </p:column>
                                <p:column headerText="Tipo Documento" sortBy="#{numer.tipodocumento}" filterBy="#{numer.tipodocumento}" width="25%">
                                    <h:outputText value="#{numer.tipodocumento}" />
                                </p:column> 
                                <p:column headerText="Estado" sortBy="#{numer.activo}" filterBy="#{numer.activo}">
                                    <h:outputText styleClass="product-badge status-#{estilos.tipoActivoBool(numer.activo)}" value="#{estilos.valorBoolActivo(numer.activo)}" />
                                </p:column>                                
                                <p:column headerText="Ultimo Número" sortBy="#{numer.ultimonumero}" filterBy="#{numer.ultimonumero}" width="25%">
                                    <h:outputText value="#{numer.ultimonumero}" />
                                </p:column> 
                                <p:column exportable="false">
                                    <!--<p:commandButton icon="pi pi-pencil" update=":form :formNuevo" actionListener="{numeracionDocumentoBean.editarNumeracion(numer)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="{numer}" target="{numeracionDocumentoBean.numeracion}" />
                                    </p:commandButton>-->
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{numer}" target="#{numeracionDocumentoBean.numeracion}" />
                                    </p:commandButton>
                                </p:column>                              
                            </p:dataTable>                            
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Numeración Documentos" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered="true">
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="comercializadora1" value="Comercializadora"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="comercializadora1" value="#{numeracionDocumentoBean.comercializadora}" title="Comercializadora"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Comercializadora"
                                                 disabled="#{!numeracionDocumentoBean.habilitarComer}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                    <f:selectItems value="#{numeracionDocumentoBean.listaComercializadoras}"
                                                   var="comer"
                                                   itemLabel="#{comer.codigo} - #{comer.nombre}"
                                                   itemValue="#{comer}" /> 
                                </p:selectOneMenu>
                            </div>                            
                        </div>                        
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="tipoDoc" value="Tipo de Documento"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-bars"></i>
                                </span>
                                <p:selectOneMenu id="tipoDoc" value="#{numeracionDocumentoBean.numeracion.tipodocumento}" title="Tipo de Documento"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" 
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Tipo de Documento">
                                    <f:selectItem noSelectionOption="true" itemLabel="Selecciona" itemValue="#{null}"/>
                                    <f:selectItem itemLabel="Factura" itemValue="FAC"/>
                                    <f:selectItem itemLabel="Nota de Pedido" itemValue="NPE"/>
                                    <f:selectItem itemLabel="Nota de Débito" itemValue="NDB"/>
                                    <f:selectItem itemLabel="Nota de Crédito" itemValue="NCR"/>
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div>    
                        <div class="p-field p-col-12 p-md-6">                            
                            <span class="ui-float-label">                                            
                                <p:inputText id="ultNum" value="#{numeracionDocumentoBean.numeracion.ultimonumero}" required="true" >
                                    <p:keyFilter regEx="/[0-9\.\- ]/i"/>
                                </p:inputText>
                                <p:outputLabel for="ultNum">Último Número</p:outputLabel>
                            </span>
                        </div>                      
                        <div class="p-field p-col-12 p-md-6"></div>   
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{numeracionDocumentoBean.estadoNumeracion}" > </p:toggleSwitch>
                            </div>
                        </div>    
                    </div>                                                               
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{numeracionDocumentoBean.save}" 
                                     update=":form formNuevo" styleClass="p-mr-2" />
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>


        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Numeración Documento?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{numeracionDocumentoBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form" />
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>                      

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
