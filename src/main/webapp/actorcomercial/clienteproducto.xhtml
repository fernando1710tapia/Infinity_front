<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Cliente Producto</ui:define>

    <ui:define name="viewname">
        <li>Cliente Producto</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{clienteProductoBean.nuevoClienteProducto()}" update=":formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar> 
                            <div class="ui-fluid p-formgrid p-grid">  
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{clienteProductoBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         filter="true" filterMatchMode="startsWith"
                                                         disabled="#{!clienteProductoBean.habilitarComer}">
                                            <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>                                            
                                            <f:selectItems value="#{clienteProductoBean.listaComercializadoras}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />  
                                            <p:ajax event="change" listener="#{clienteProductoBean.seleccionarComercializdora}"
                                                    update="cliente dt-products" />
                                        </p:selectOneMenu>
                                    </div>                            
                                </div>
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="cliente" value="#{clienteProductoBean.cliente}" title="Cliente"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         filter="true" filterMatchMode="startsWith"
                                                         disabled="#{!clienteProductoBean.habilitarCli}">
                                            <f:selectItem noSelectionOption="true" itemLabel="Cliente" itemValue="#{null}"/>
                                            <f:selectItems value="#{clienteProductoBean.listaClientes}"
                                                           var="cli"
                                                           itemLabel="#{cli.codigo} - #{cli.nombrecomercial}"
                                                           itemValue="#{cli}" />                                            
                                        </p:selectOneMenu>
                                    </div>                                                
                                </div>                                
                                <div class="p-field p-col-12 p-md-2">                
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="#{clienteProductoBean.actualizarLista()}" update="dt-products"/>
                                </div>
                            </div>
                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="cliente" value="#{clienteProductoBean.listaCliProductos}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Cliente Producto</span>
                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:column headerText="Producto" sortBy="#{cliente.producto.nombre}" filterBy="#{cliente.producto.nombre}" width="20%">
                                    <h:outputText value="#{cliente.producto.nombre}" />
                                </p:column>
                                <p:column headerText="Codigo STC" sortBy="#{cliente.producto.codigostc}" filterBy="#{cliente.producto.codigostc}" width="20%">
                                    <h:outputText value="#{cliente.producto.codigostc}" />
                                </p:column>
                                <p:column headerText="Codigo ARCH" sortBy="#{cliente.producto.codigoarch}" filterBy="#{cliente.producto.codigoarch}" width="20%">
                                    <h:outputText value="#{cliente.producto.codigoarch}" />
                                </p:column>                                                                
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{clienteProductoBean.editarPagoFactura(cliente)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{cliente}" target="#{clienteProductoBean.clienteproducto}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{cliente}" target="#{clienteProductoBean.clienteproducto}" />
                                    </p:commandButton>
                                </p:column>                                
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Cliente Producto" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered="true">                                
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="comercializadora1" value="#{clienteProductoBean.comercializadora}" title="Comercializadora"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Comercializadora"
                                                 disabled="#{clienteProductoBean.soloLectura}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteProductoBean.listaComercializadoras}"
                                                   var="comer"
                                                   itemLabel="#{comer.codigo} - #{comer.nombre}"
                                                   itemValue="#{comer}" /> 
                                    <p:ajax event="change" listener="#{clienteProductoBean.seleccionarComercializdora}"
                                                    update="cliente" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6"></div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="cliente" value="Cliente"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="cliente" value="#{clienteProductoBean.cliente}" title="Cliente"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 disabled="#{clienteProductoBean.soloLectura}"
                                                 required="true" requiredMessage="Seleccione Cliente">
                                    <f:selectItem noSelectionOption="true" itemLabel="Selecciona" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteProductoBean.listaClientes}"
                                                   var="cli"
                                                   itemLabel="#{cli.codigo} - #{cli.nombrecomercial}"
                                                   itemValue="#{cli}" />
                                    <p:ajax event="change" listener="#{clienteProductoBean.seleccionarCliente()}"
                                        update="producto"/>
                                </p:selectOneMenu>                                
                            </div>                            
                        </div>                                   
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="producto" value="Producto"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="producto" value="#{clienteProductoBean.clienteproducto.producto}" title="Producto"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 disabled="#{clienteProductoBean.soloLectura}"
                                                 required="true" requiredMessage="Seleccione Producto">
                                    <f:selectItem noSelectionOption="true" itemLabel="Selecciona" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteProductoBean.listaProductoFinal}"
                                                   var="prod"
                                                   itemLabel="#{prod.codigo} - #{prod.nombre}"
                                                   itemValue="#{prod}" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>                                                                      
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{clienteProductoBean.estadoClienteProducto}" > </p:toggleSwitch>
                            </div>
                        </div>                                        
                    </div>                    
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{clienteProductoBean.save()}"
                                     update=":form formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('manageProductDialog').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Producto?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{clienteProductoBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>                   
    </ui:define>
</ui:composition>
