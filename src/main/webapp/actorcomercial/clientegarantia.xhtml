<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Cliente Garantía</ui:define>

    <ui:define name="viewname">
        <li>Cliente Garantía</li>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{clienteGarantiaBean.nuevoClienteGarantia()}" update="form :formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar> 
                            <div class="ui-fluid p-formgrid p-grid">  
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{clienteGarantiaBean.codComer}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" 
                                                         filter="true" filterMatchMode="startsWith"
                                                         >            
                                            <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                            <f:selectItems value="#{clienteGarantiaBean.listaComercializadora}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer.codigo}" />  
                                            <p:ajax event="change" listener="#{clienteGarantiaBean.seleccionarComercializadora(1)}"
                                                    update="cliente" />
                                        </p:selectOneMenu>
                                    </div>                            
                                </div>
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="cliente" value="#{clienteGarantiaBean.codCliente}" title="Cliente"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" 
                                                         filter="true" filterMatchMode="contains"
                                                         >
                                            <f:selectItem noSelectionOption="true" itemLabel="Cliente" itemValue="#{null}"/>
                                            <f:selectItems value="#{clienteGarantiaBean.listaClientes}"
                                                           var="cli"
                                                           itemLabel="#{cli.codigo} - #{cli.nombrecomercial}"
                                                           itemValue="#{cli.codigo}" />                                            
                                        </p:selectOneMenu>
                                    </div>                                                
                                </div>                                
                                <div class="p-field p-col-12 p-md-2">                
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="#{clienteGarantiaBean.actualizarLista()}" update="dt-products"/>
                                </div>
                                <div class="p-field p-col-12 p-md-2">                                    
                                    <p:commandButton value="Ver Garantias" icon="pi pi-sliders-h" actionListener="#{clienteGarantiaBean.mostrarGarantia()}" update="form :formGarantia"
                                                     styleClass="ui-button-info"/>
                                </div>
                            </div>
                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="cliente" value="#{clienteGarantiaBean.listaClientegarantia}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Cliente Garantía</span>

                                        <!--<span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>-->
                                    </div>
                                </f:facet>

                                <p:column headerText="Numero" sortBy="#{cliente.clientegarantiaPK.numero}" filterBy="#{cliente.clientegarantiaPK.numero}" width="10%">
                                    <h:outputText value="#{cliente.clientegarantiaPK.numero}" />
                                </p:column>
                                <p:column headerText="Banco" sortBy="#{cliente.banco.nombre}" filterBy="#{cliente.banco.nombre}" width="15%">
                                    <h:outputText value="#{cliente.banco.nombre}" />
                                </p:column>
                                <p:column headerText="Fecha Inicio Vigencia" sortBy="#{cliente.fechainiciovigencia}" filterBy="#{cliente.fechainiciovigencia}" width="10%">
                                    <h:outputText value="#{cliente.fechainiciovigencia}" >
                                        <f:convertDateTime pattern="dd/MM/yyyy" type="date" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Fecha Fin Vigencia" sortBy="#{cliente.fechafinvigencia}" filterBy="#{cliente.fechafinvigencia}" width="10%">
                                    <h:outputText value="#{cliente.fechafinvigencia}" >
                                        <f:convertDateTime pattern="dd/MM/yyyy" type="date" />
                                    </h:outputText>
                                </p:column>
                                <p:column headerText="Estado" sortBy="#{cliente.activo}" filterBy="#{cliente.activo}" width="10%">
                                    <h:outputText styleClass="product-badge status-#{estilos.tipoActivoBool(cliente.activo)}" value="#{estilos.valorBoolActivo(cliente.activo)}" />
                                </p:column>
                                <p:column headerText="Valor" sortBy="#{cliente.valor}" filterBy="#{cliente.valor}" width="10%">
                                    <h:outputText value="#{cliente.valor}" >
                                        <f:convertNumber currencySymbol="$" type="currency" />
                                    </h:outputText>
                                </p:column>                                
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{clienteGarantiaBean.editarClientegarantia(cliente)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{cliente}" target="#{clienteGarantiaBean.clientegarantia}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{cliente}" target="#{clienteGarantiaBean.clientegarantia}" />
                                    </p:commandButton>
                                </p:column>                                
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Cliente Garantía" width="50%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered="true">                                
                    <div class="ui-fluid p-formgrid p-grid"> 
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="comercilaizadora1" value="Comercializadora"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="comercilaizadora1" value="#{clienteGarantiaBean.codComer}" title="Comercializadora"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" disabled="#{clienteGarantiaBean.editarCliente}"
                                                 filter="true" filterMatchMode="startsWith"
                                                 >             
                                    <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteGarantiaBean.listaComercializadora}"
                                                   var="comer"
                                                   itemLabel="#{comer.objRelacionado}"
                                                   itemValue="#{comer.codigo}" />  
                                    <p:ajax event="change" listener="#{clienteGarantiaBean.seleccionarComercializadora(2)}"
                                            update="cliente1" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6"></div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="cliente1" value="Cliente"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="cliente1" value="#{clienteGarantiaBean.cliente}" title="Cliente"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="contains"
                                                 disabled="#{clienteGarantiaBean.editarCliente}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Cliente" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteGarantiaBean.listaClientes}"
                                                   var="cli"
                                                   itemLabel="#{cli.codigo} - #{cli.nombrecomercial}"
                                                   itemValue="#{cli}" />   
                                    <p:ajax event="change" listener="#{clienteGarantiaBean.seleccionarCliente()}"
                                            update="guardar" />
                                </p:selectOneMenu>
                            </div>                                                
                        </div>    
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="banco" value="Banco"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="banco" value="#{clienteGarantiaBean.banco}" title="Banco"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 disabled="#{clienteGarantiaBean.editarCliente}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Banco" itemValue="#{null}"/>
                                    <f:selectItems value="#{clienteGarantiaBean.listaBancos}"
                                                   var="banc"
                                                   itemLabel="#{banc.codigo} - #{banc.nombre}"
                                                   itemValue="#{banc}" />                                            
                                </p:selectOneMenu>
                            </div>                                                
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div>  
                        <div class="p-field p-col-12 p-md-6">  
                            <span class="ui-float-label">
                                <p:datePicker id="IniVigencia" value="#{clienteGarantiaBean.fechaInicioVigencia}" showIcon="true" pattern="dd/MM/yyyy" maxdate="#{clienteGarantiaBean.fechaInicioVigencia}" disabled="#{clienteGarantiaBean.editarCliente}">
                                    <p:ajax event="dateSelect" update="finVigencia" listener="#{clienteGarantiaBean.controlarFecha(dateSelect)}"/>
                                </p:datePicker>
                                <p:outputLabel for="IniVigencia" value="Inicio de Vigencia"/>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">  
                            <span class="ui-float-label">
                                <p:datePicker id="finVigencia" value="#{clienteGarantiaBean.clientegarantia.fechafinvigencia}" showIcon="true" pattern="dd/MM/yyyy" mindate="#{clienteGarantiaBean.fechaFinVigencia}" disabled="#{clienteGarantiaBean.editarCliente}"/>
<!--                                    <p:ajax event="dateSelect" update=":form" listener="{clienteGarantiaBean.actualizarFecha(dateSelect, 2)}" />
                                </p:datePicker>-->
                                <p:outputLabel for="finVigencia" value="Fin de Vigencia"/>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div>  
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">                                            
                                <p:inputNumber id="valor" value="#{clienteGarantiaBean.clientegarantia.valor}" required="true" 
                                               minValue="0" decimalPlaces="3" disabled="#{clienteGarantiaBean.editarCliente}">
                                    <p:keyFilter regEx="/[0-9\.\- ]/i"/>
                                </p:inputNumber>
                                <p:outputLabel for="valor">Valor</p:outputLabel>
                            </span>
                        </div>     
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">                                            
                                <p:inputText id="numero" value="#{clienteGarantiaBean.clientegarantiaPK.numero}" required="true" disabled="#{clienteGarantiaBean.editarCliente}"/>
                                <p:outputLabel for="numero">Número</p:outputLabel>
                            </span>
                        </div>  
                        <div class="p-field p-col-12 p-md-12">  
                            <span class="ui-float-label">
                                <p:inputTextarea id="observacion" value="#{clienteGarantiaBean.clientegarantia.observacion}" disabled="#{clienteGarantiaBean.editarCliente}"/>
                                <p:outputLabel for="observacion" value="Observación"/>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{clienteGarantiaBean.estadoClienteGarantia}" > </p:toggleSwitch>
                            </div>
                        </div>                                        
                    </div>                    
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton id="guardar" value="Guardar" icon="pi pi-check" actionListener="#{clienteGarantiaBean.save()}"
                                     update=":form formNuevo" styleClass="p-mr-2" disabled="#{!clienteGarantiaBean.controlaGarantia}"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('manageProductDialog').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <p:dialog header="Administración Garantía" width="40%" showEffect="fade" modal="true" widgetVar="garantia" responsive="true">
            <h:form id="formGarantia">
                <p:outputPanel rendered="true">                                
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-12">
                            <p:panel  header="Última actualización: #{clienteGarantiaBean.formattedDate}" styleClass="disk-spaces" id="panelGarantia">
                                <!--<h4 align="center">Garantía: {monitorcomercialBean.usoActualS} %</h4>-->
                                <br></br>
                                <span >Valor Total Garantizado: $ #{clienteGarantiaBean.totalGaranS} </span> 
                                <p:progressBar value="#{clienteGarantiaBean.porcentajeValores(clienteGarantiaBean.totalGaran)}" widgetVar="pb2"/>

                                <span >Deuda Total: $ #{clienteGarantiaBean.totalDeudaS} </span> 
                                <p:progressBar value="#{clienteGarantiaBean.porcentajeValores(clienteGarantiaBean.totalDeuda)}" widgetVar="pb1"/>                               

                                <span>Saldo Disponible: $ #{clienteGarantiaBean.saldoDispS}</span>
                                <p:progressBar value="#{clienteGarantiaBean.porcentajeValores(clienteGarantiaBean.saldoDisp)}" widgetVar="pb3" />
                                <f:facet name="actions">                        
                                    <p:commandLink styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default" actionListener="#{clienteGarantiaBean.mostrarGarantia}" update="panelGarantia">
                                        <h:outputText styleClass="ui-icon pi pi-replay"/>
                                    </p:commandLink>
                                </f:facet>
                            </p:panel>
                        </div>                                        
                    </div>                    
                </p:outputPanel>               
            </h:form>
        </p:dialog>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Área Mercadéo?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{clienteGarantiaBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>                   
    </ui:define>
</ui:composition>
