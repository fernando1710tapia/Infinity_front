<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Comercializadora Producto</ui:define>

    <ui:define name="viewname">
        <li>Comercializadora Producto</li>
        <li>/</li>
        <li>
            <p:link outcome="/crud">Crud</p:link>
        </li>
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel id="manage-product-content1" rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{comercializadoraProductoBean.nuevoComerProducto()}" update="form :formNuevo" 
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>   
                            <div class="ui-fluid p-formgrid p-grid">
                                <div class="p-field p-col-12 p-md-4">
                                    <div class="ui-inputgroup">
                                        <span class="ui-inputgroup-addon">
                                            <i class="fa fa-money"></i>
                                        </span>
                                        <p:selectOneMenu id="comercializadora" value="#{comercializadoraProductoBean.comercializadora}" title="Comercializadora"
                                                         panelStyle="width:175px" style="min-width: 80%;" 
                                                         autoWidth="false" converter="converterg"
                                                         filter="true" filterMatchMode="startsWith"
                                                         disabled="#{!comercializadoraProductoBean.habilitarComer}">     
                                            <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>     
                                            <f:selectItems value="#{comercializadoraProductoBean.listaComercializadoras}"
                                                           var="comer"
                                                           itemLabel="#{comer.objRelacionado}"
                                                           itemValue="#{comer}" />  
                                            <p:ajax event="change" listener="#{comercializadoraProductoBean.seleccionarComer()}"/>
                                        </p:selectOneMenu>
                                    </div>                            
                                </div>                                                                
                                <div class="p-field p-col-12 p-md-2">                
                                    <p:commandButton value="Buscar" icon="pi pi-search-plus" actionListener="#{comercializadoraProductoBean.actualizarLista()}" immediate="true" update="dt-products"/>
                                </div>
                            </div>
                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="comer" value="#{comercializadoraProductoBean.listaComerProductos}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Comercializadora Producto</span>

                                        <!--<span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>-->
                                    </div>
                                </f:facet>

                                <p:column headerText="Código" sortBy="#{comer.producto.codigo}" filterBy="#{comer.producto.codigo}" width="30%">
                                    <h:outputText value="#{comer.producto.codigo}" />
                                </p:column>
                                <p:column headerText="Producto" sortBy="#{comer.producto.nombre}" filterBy="#{comer.producto.nombre}" width="30%">
                                    <h:outputText value="#{comer.producto.nombre}" />
                                </p:column>                                
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{comercializadoraProductoBean.editarProdComer(comer)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{comer}" target="#{comercializadoraProductoBean.comercializadoraproducto}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{comer}" target="#{comercializadoraProductoBean.comercializadoraproducto}" />
                                    </p:commandButton>
                                </p:column>                                                      
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Comercializadora Producto" width="48%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered="true">                                
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="comercializadora1" value="#{comercializadoraProductoBean.comercializadora}" title="Comercializadora"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Comercializadora"
                                                 disabled="#{comercializadoraProductoBean.soloLectura}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Comercializadora" itemValue="#{null}"/>
                                    <f:selectItems value="#{comercializadoraProductoBean.listaComercializadoras}"
                                                   var="comer"
                                                   itemLabel="#{comer.codigo} - #{comer.nombre}"
                                                   itemValue="#{comer}" /> 
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6"></div>
                        <div class="p-field p-col-12 p-md-6">
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="producto" value="#{comercializadoraProductoBean.producto}" title="Producto"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Producto"
                                                 disabled="#{comercializadoraProductoBean.soloLectura}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Producto" itemValue="#{null}"/>
                                    <f:selectItems value="#{comercializadoraProductoBean.listaProducto}"
                                                   var="prod"
                                                   itemLabel="#{prod.codigo} - #{prod.nombre}"
                                                   itemValue="#{prod}" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="medida" value="#{comercializadoraProductoBean.medida}" title="Medida"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 filter="true" filterMatchMode="startsWith"
                                                 required="true" requiredMessage="Seleccione Medida"
                                                 disabled="#{comercializadoraProductoBean.soloLectura}">
                                    <f:selectItem noSelectionOption="true" itemLabel="Medida" itemValue="#{null}"/>
                                    <f:selectItems value="#{comercializadoraProductoBean.listaMedida}"
                                                   var="med"
                                                   itemLabel="#{med.codigo} - #{med.nombre}"
                                                   itemValue="#{med}" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="p-field p-col-12 p-md-12">
                           (valores incluido iva)
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputNumber id="margenCom" value="#{comercializadoraProductoBean.comercializadoraproducto.margencomercializacion}" required="true" 
                                               minValue="0" maxValue="999.9999999" decimalPlaces="7" >
                                    <p:keyFilter regEx="/[0-9\.\- ]/i"/>
                                </p:inputNumber>                              
                                <p:outputLabel for="margenCom">Margen Comercialización</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">                                            
                                <p:inputNumber id="precioepp" value="#{comercializadoraProductoBean.comercializadoraproducto.precioepp}" required="true" 
                                             minValue="0" maxValue="999.9999999" decimalPlaces="7" >
                                    <p:keyFilter regEx="/[0-9\.\- ]/i"/>
                                </p:inputNumber>
                                <p:outputLabel for="precioepp">Precio EPP</p:outputLabel>
                            </span>
                        </div>                                                                         
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">                                            
                                <p:inputNumber id="pvpsug" value="#{comercializadoraProductoBean.comercializadoraproducto.pvpsugerido}" required="true" 
                                             minValue="0" maxValue="999.9999999" decimalPlaces="7" >
                                    <p:keyFilter regEx="/[0-9\.\- ]/i"/>
                                </p:inputNumber>
                                <p:outputLabel for="pvpsug">PVP Sugerido</p:outputLabel>
                            </span>
                        </div>                                   
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{comercializadoraProductoBean.estadoComerProducto}" > </p:toggleSwitch>
                            </div>
                        </div>    
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="aplicaiva"  value="Solo Aplica IVA"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="aplicaiva" value="#{comercializadoraProductoBean.estadoAplicaIva}" > </p:toggleSwitch>
                            </div>
                        </div> 
                    </div>
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{comercializadoraProductoBean.save()}" 
                                     update=":form formNuevo" styleClass="p-mr-2" />                   
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>
        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Producto?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{comercializadoraProductoBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>
        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
