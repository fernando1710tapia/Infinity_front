<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Abastecedora</ui:define>

    <ui:define name="viewname">
        <li>Abastecedora</li>
        <li>/</li>
        <li>
            <p:link outcome="/crud">Crud</p:link>
        </li>
    </ui:define>


    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />

                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nueva" icon="pi pi-plus" actionListener="#{abastecedoraBean.nuevaAbastecedora()}" update="formNuevo" 
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Exposrt" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="product" value="#{abastecedoraBean.listaAbastecedoraBean}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Abastecedoras</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:ajax event="rowToggle" listener="#{crudDemoView.onRowToggle}" />
                                
                                <p:column headerText="Código" sortBy="#{product.codigo}" filterBy="#{product.codigo}" width="15%">
                                    <h:outputText value="#{product.codigo}" />
                                </p:column>
                                <p:column headerText="Nombre" sortBy="#{product.nombre}" filterBy="#{product.nombre}" width="30%">
                                    <h:outputText value="#{product.nombre}" />
                                </p:column>
                                <p:column headerText="Estado" sortBy="#{product.activo}" filterBy="#{product.activo}">
                                    <h:outputText styleClass="product-badge status-#{estilos.tipoActivo(product.activo)}" value="#{estilos.valorActivo(product.activo)}" />
                                </p:column>
                                <p:column exportable="false">
                                    <p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="#{abastecedoraBean.editarAbastecedora(product)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="#{product}" target="#{abastecedoraBean.abastecedora}" />
                                    </p:commandButton>
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{product}" target="#{abastecedoraBean.abastecedora}" />
                                    </p:commandButton>
                                </p:column>                                
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Abastecedora" width="60%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered = "true">                               
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-12"></div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="codigoComer" value="#{abastecedoraBean.abastecedora.codigo}" required="true" maxlength="4" disabled="#{abastecedoraBean.soloLectura}"/>
                                <p:outputLabel for="codigoComer">Código</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-8">
                            <span class="ui-float-label">
                                <p:inputText id="nombre" value="#{abastecedoraBean.abastecedora.nombre}" required="true" maxlength="50"/>
                                <p:outputLabel for="nombre">Nombre</p:outputLabel>
                            </span>
                        </div>                                                
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="ruc" value="#{abastecedoraBean.abastecedora.ruc}" required="true" maxlength="13"/>
                                <p:outputLabel for="ruc">Ruc</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="idRepresentante" value="#{abastecedoraBean.abastecedora.idRepLegal}" maxlength="13"/>
                                <p:outputLabel for="idRepresentante">Id Representate Legal</p:outputLabel>
                            </span>     
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="nombreRepresentante" value="#{abastecedoraBean.abastecedora.nomRepLegal}" maxlength="100"/>
                                <p:outputLabel for="nombreRepresentante">Nombre Representate Legal</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-12">
                            <span class="ui-float-label">
                                <p:inputTextarea id="direccion" value="#{abastecedoraBean.abastecedora.direccion}" maxlength="200"/>
                                <p:outputLabel for="direccion">Dirección</p:outputLabel>
                            </span>        
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="codigoArch" value="#{abastecedoraBean.abastecedora.codigoARCH}" required="true"  maxlength="10"/>
                                <p:outputLabel for="codigoArch">Código ARCH</p:outputLabel>
                            </span>                                                   
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:inputText id="codigoStc" value="#{abastecedoraBean.abastecedora.codigoSTC}" required="true" maxlength="10"/>
                                <p:outputLabel for="codigoStc">Código STC</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-4">
                            <span class="ui-float-label">
                                <p:password id="claveStc" value="#{abastecedoraBean.abastecedora.claveSTC}" required="true" maxlength="4" redisplay="true"/>
                                <p:outputLabel for="claveStc">Clave STC</p:outputLabel>
                            </span>
                        </div>                                                                                                                                                                            
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="telf1" value="#{abastecedoraBean.abastecedora.tel1}" maxlength="12"/>
                                <p:outputLabel for="telf1">Teléfono 1</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="telf2" value="#{abastecedoraBean.abastecedora.tel2}" maxlength="12"/>
                                <p:outputLabel for="telf2">Teléfono 2</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="correo1" value="#{abastecedoraBean.abastecedora.correo1}" maxlength="100"/>
                                <p:outputLabel for="correo1">Correo 1</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <span class="ui-float-label">
                                <p:inputText id="correo2" value="#{abastecedoraBean.abastecedora.corre2}" maxlength="100"/>
                                <p:outputLabel for="correo2">Correo 2</p:outputLabel>
                            </span>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="estado"  value="Activo"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="estado" value="#{abastecedoraBean.estadoAbastecedora}" > </p:toggleSwitch>
                            </div>
                        </div>
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="contEspe"  value="Contribuyente Especial"/>
                            <div class="ui-inputgroup">
                                <p:toggleSwitch id="contEspe" value="#{abastecedoraBean.estadoContribuyente}" > </p:toggleSwitch>
                            </div>
                        </div>                                                
                    </div>                                                                                           
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{abastecedoraBean.save()}" 
                                     update=":form formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>

        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Área Mercadéo?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{abastecedoraBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form"/>
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
