<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">Seguridad Permiso</ui:define>

    <ui:define name="viewname">
        <li>Seguridad Permiso</li>       
    </ui:define>

    <ui:define name="content">
        <h:form id="form">
            <p:outputPanel rendered="true">
                <div class="p-grid crud-demo">
                    <div class="p-col-12">
                        <div class="card">
                            <p:growl id="messages" showDetail="true" />
                            <p:toolbar styleClass="p-mb-4">
                                <p:toolbarGroup>
                                    <p:commandButton value="Nuevo" icon="pi pi-plus" actionListener="#{seguridadpermisoBean.nuevaSeguridad()}" update="formNuevo"
                                                     styleClass="ui-button-success" style="margin-right: .5rem" />
                                </p:toolbarGroup>
                                <p:toolbarGroup>
                                    <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                        <p:dataExporter type="pdf" target="dt-products" fileName="products"/>
                                    </p:commandButton>
                                </p:toolbarGroup>
                            </p:toolbar>

                            <p:dataTable id="dt-products" widgetVar="dtProducts" var="perm" value="#{seguridadpermisoBean.listaPermiso}" reflow="true" styleClass="products-table"
                                         paginator="true" rows="10" rowSelectMode="add" paginatorPosition="bottom">
                                <f:facet name="header">
                                    <div class="products-table-header">
                                        <span style="font-weight: bold">Lista Seguridad Permiso</span>

                                        <span class="filter-container ui-input-icon-left">
                                            <i class="pi pi-search"></i>
                                            <p:inputText id="globalFilter" onkeyup="PF('dtProducts').filter()" placeholder="Buscar" />
                                        </span>
                                    </div>
                                </f:facet>

                                <p:column headerText="Nivel Operación" sortBy="#{perm.permisoPK.niveloperacion}" filterBy="#{perm.permisoPK.niveloperacion}" width="35%">
                                    <h:outputText value="#{perm.permisoPK.niveloperacion}" />
                                </p:column>
                                <p:column headerText="Menú" sortBy="#{perm.permisoPK.codigomenu}" filterBy="#{perm.permisoPK.codigomenu}" width="35%">
                                    <h:outputText value="#{perm.permisoPK.codigomenu} - #{perm.menu.nombre}" />
                                </p:column>                           
                                <p:column exportable="false">
                                    <!--<p:commandButton icon="pi pi-pencil" update="form :formNuevo" actionListener="{seguridadpermisoBean.editarPermiso(perm)}"
                                                     styleClass="edit-button rounded-button ui-button-success" process="@this">
                                        <f:setPropertyActionListener value="{perm}" target="{seguridadpermisoBean.permiso}" />
                                    </p:commandButton>-->
                                    <p:commandButton class="ui-button-warning rounded-button" icon="pi pi-trash" process="@this" oncomplete="PF('deleteProductDialog').show()" >
                                        <f:setPropertyActionListener value="#{perm}" target="#{seguridadpermisoBean.permiso}" />
                                    </p:commandButton>
                                </p:column>
                            </p:dataTable>
                        </div>
                    </div>
                </div>
            </p:outputPanel>
        </h:form>

        <p:dialog header="Seguridad Permiso" width="40%" showEffect="fade" modal="true" widgetVar="nuevo" responsive="true">
            <h:form id="formNuevo">
                <p:outputPanel rendered="true" class="ui-fluid">
                    <div class="ui-fluid p-formgrid p-grid">
                        <div class="p-field p-col-12 p-md-6">
                            <p:outputLabel for="nivelOpe" value="Nivel de Operación"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="nivelOpe" value="#{seguridadpermisoBean.permisoPK.niveloperacion}" title="Nivel Operacion"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" 
                                                 required="true" requiredMessage="Seleccione Nivel">
                                    <f:selectItem noSelectionOption="true" itemLabel="Selecciona" itemValue="#{null}"/>
                                    <f:selectItem itemLabel="Adm. Sistema" itemValue="cero"/>
                                    <f:selectItem itemLabel="Adm. Comercializadora" itemValue="adco"/>
                                    <f:selectItem itemLabel="Agente Comercial" itemValue="agco"/>
                                    <f:selectItem itemLabel="Usuario Comercial" itemValue="usac"/>                                                                                                
                                </p:selectOneMenu>
                            </div>
                        </div>                        
                        <div class="p-field p-col-12 p-md-6">  
                            <p:outputLabel for="codMenu" value="Código de Menú"/>
                            <div class="ui-inputgroup">
                                <span class="ui-inputgroup-addon">
                                    <i class="fa fa-money"></i>
                                </span>
                                <p:selectOneMenu id="codMenu" value="#{seguridadpermisoBean.menu}" title="Menu"
                                                 panelStyle="width:175px" style="min-width: 80%;" 
                                                 autoWidth="false" converter="converterg"
                                                 required="true" requiredMessage="Seleccione Menu">
                                    <f:selectItem noSelectionOption="true" itemLabel="Menú" itemValue="#{null}"/>
                                    <f:selectItems value="#{seguridadpermisoBean.listaMenuHijoBean}"
                                                   var="menuP"
                                                   itemLabel="#{menuP.codigo} - #{menuP.nombre}"
                                                   itemValue="#{menuP}" />                                             
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="p-field p-col-12 p-md-12"></div> 
                    </div>
                </p:outputPanel>
                <div class="p-grid p-justify-end">
                    <p:commandButton value="Guardar" icon="pi pi-check" actionListener="#{seguridadpermisoBean.save()}"  
                                     update=":form formNuevo" styleClass="p-mr-2"/>
                    <p:commandButton value="Cancelar" icon="pi pi-times" onclick="PF('nuevo').hide()" class="ui-button-secondary" />
                </div>
            </h:form>
        </p:dialog>
        <p:confirmDialog widgetVar="deleteProductDialog" showEffect="fade" width="300" message="Eliminar Permiso?" header="Confirm" severity="warn">
            <p:commandButton value="Si" icon="pi pi-check" actionListener="#{seguridadpermisoBean.deleteItems()}" process="@this" oncomplete="PF('deleteProductDialog').hide()"
                             update=":form" />
            <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times" onclick="PF('deleteProductDialog').hide()" />
        </p:confirmDialog>

        <p:confirmDialog global="true" showEffect="fade" width="300">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary" icon="pi pi-times" />
        </p:confirmDialog>
    </ui:define>
</ui:composition>
